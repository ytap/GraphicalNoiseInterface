<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multiplayer Canvas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; background: #222; color: white; font-family: sans-serif; }
        canvas { touch-action: none; border: 2px solid #555; margin-top: 10px; }
        .controls { margin: 15px 10px 5px 10px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center; }
        button { padding: 10px 15px; font-size: 14px; border: none; border-radius: 5px; cursor: pointer; background: #444; color: white; transition: 0.2s; }
        button.active { background: #fff; color: #000; font-weight: bold; box-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .color-picker-container { display: flex; align-items: center; gap: 10px; background: #333; padding: 5px 15px; border-radius: 5px; }
        input[type="color"] { width: 40px; height: 40px; padding: 0; border: none; border-radius: 50%; cursor: pointer; }
        
        #effectBtn.active { background: #ffaa00; color: #000; }
    </style>
</head>
<body>
    <div class="controls">
        <button id="effectBtn">？</button>
        
        <div class="color-picker-container">
            <label for="colorPicker">Color:</label>
            <input type="color" id="colorPicker" value="#ff5555">
        </div>
    </div>

    <script>
        const socket = io();
        let currentEffect = 0;

        const effectBtn = document.getElementById('effectBtn');
        effectBtn.onclick = () => {
            if (currentEffect === 0) {
                currentEffect = Math.floor(Math.random() * 3) + 1;
                effectBtn.classList.add('active');
                effectBtn.innerText = '！';
            } else {
                currentEffect = 0;
                effectBtn.classList.remove('active');
                effectBtn.innerText = '？';
            }
        };

        function hexToRgb(hex) {
            let bigint = parseInt(hex.substring(1), 16);
            let r = (bigint >> 16) & 255;
            let g = (bigint >> 8) & 255;
            let b = bigint & 255;
            return [r, g, b];
        }

        function setup() {
            createCanvas(512, 512);
            background(0);
            
            socket.on('drawData', (data) => {
                fill(data.color[0], data.color[1], data.color[2]);
                noStroke();
                ellipse(data.x, data.y, 20, 20);
            });
        }

        function draw() {
            background(0, 5); 
        }

        function sendAndDrawPoint(x, y, color) {
            let data = {
                x: Math.round(x),
                y: Math.round(y),
                color: color
            };
            
            fill(data.color[0], data.color[1], data.color[2]);
            noStroke();
            ellipse(data.x, data.y, 20, 20);
            
            socket.emit('drawData', data);
        }

        function mouseDragged() {
            const currentHexColor = document.getElementById('colorPicker').value;
            const myColor = hexToRgb(currentHexColor);

            if (currentEffect === 0) {
                sendAndDrawPoint(mouseX, mouseY, myColor);
            } 
            else if (currentEffect === 1) {
                for (let i = 0; i < 4; i++) {
                    let offsetX = random(-30, 30);
                    let offsetY = random(-30, 30);
                    sendAndDrawPoint(mouseX + offsetX, mouseY + offsetY, myColor);
                }
            } 
            else if (currentEffect === 2) {
                let offsetX = sin(frameCount * 0.5) * 40;
                let offsetY = cos(frameCount * 0.5) * 40;
                sendAndDrawPoint(mouseX + offsetX, mouseY + offsetY, myColor);
            } 
            else if (currentEffect === 3) {
                sendAndDrawPoint(mouseX - 20, mouseY - 20, myColor);
                sendAndDrawPoint(mouseX + 20, mouseY + 20, myColor);
            }
        }
        
        function touchMoved() { 
            mouseDragged(); 
            return false; 
        }
    </script>
</body>
</html>
