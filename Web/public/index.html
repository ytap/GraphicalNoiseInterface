<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multiplayer Canvas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            background: #111; color: #eee;
            font-family: 'Helvetica Neue', sans-serif;
            min-height: 100svh;
            overflow-x: hidden;
        }

        /* --- Status bar --- */
        #statusbar {
            width: 100%; max-width: 512px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 12px;
            font-size: 12px; color: #888;
        }
        #conn-dot {
            display: inline-block; width: 8px; height: 8px;
            border-radius: 50%; background: #555;
            margin-right: 5px; transition: background 0.3s;
        }
        #conn-dot.online { background: #4caf50; }

        /* --- Canvas --- */
        canvas { display: block; touch-action: none; width: 100% !important; height: auto !important; max-width: 512px; }

        /* --- Draw controls --- */
        #draw-controls {
            width: 100%; max-width: 512px;
            display: flex; gap: 8px;
            align-items: center; justify-content: center;
            padding: 10px 12px;
        }
        .color-wrap {
            display: flex; align-items: center; gap: 8px;
            background: #222; padding: 6px 12px; border-radius: 8px;
        }
        .color-wrap label { font-size: 12px; color: #888; }
        input[type="color"] {
            width: 36px; height: 36px;
            padding: 0; border: none; border-radius: 50%; cursor: pointer;
            background: none;
        }
        .clear-btn {
            padding: 8px 18px; font-size: 13px;
            border: 1px solid #555; border-radius: 8px;
            cursor: pointer; background: #1e1e1e; color: #f44336;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .clear-btn:active { transform: scale(0.95); }

        /* --- XY Pad section --- */
        #xy-section {
            width: 100%; max-width: 512px;
            padding: 8px 12px 16px;
            border-top: 1px solid #222;
        }
        #xy-section h3 {
            font-size: 11px; color: #555; letter-spacing: 0.1em;
            text-transform: uppercase; margin: 0 0 10px 0; font-weight: normal;
        }
        #xy-pads {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .xy-wrap {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            flex: 1;
        }
        .xy-title {
            font-size: 10px; color: #666; text-align: center;
            white-space: nowrap;
        }
        .xy-pad-outer {
            position: relative; width: 100%; aspect-ratio: 1;
        }
        .xy-axis-label {
            position: absolute; font-size: 9px; color: #444; pointer-events: none;
            white-space: nowrap;
        }
        .xy-axis-label.x-left  { bottom: -16px; left: 0; }
        .xy-axis-label.x-right { bottom: -16px; right: 0; }
        .xy-axis-label.y-top   { top: 0; left: -2px; transform: translateX(-100%); }
        .xy-axis-label.y-bot   { bottom: 0; left: -2px; transform: translateX(-100%); }

        .xy-pad {
            width: 100%; height: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            position: relative;
            cursor: crosshair;
            touch-action: none;
            overflow: hidden;
        }
        .xy-pad::before {
            content: '';
            position: absolute; inset: 0;
            background:
                linear-gradient(to right, transparent 49.5%, #2a2a2a 49.5%, #2a2a2a 50.5%, transparent 50.5%),
                linear-gradient(to bottom, transparent 49.5%, #2a2a2a 49.5%, #2a2a2a 50.5%, transparent 50.5%);
            pointer-events: none;
        }
        .xy-dot {
            position: absolute;
            width: 18px; height: 18px;
            border-radius: 50%;
            background: #7c8fff;
            border: 2px solid #fff;
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: background 0.15s;
            box-shadow: 0 0 8px rgba(124,143,255,0.6);
        }
        .xy-pad:active .xy-dot { background: #fff; }
    </style>
</head>
<body>

    <div id="statusbar">
        <span><span id="conn-dot"></span><span id="conn-label">Connecting...</span></span>
        <span id="user-count">👤 —</span>
    </div>

    <div id="draw-controls">
        <div class="color-wrap">
            <label for="colorPicker">Color</label>
            <input type="color" id="colorPicker" value="#ff5555">
        </div>
        <button class="clear-btn" id="clearBtn">Clear</button>
        <button class="clear-btn" id="resetBtn" style="color:#aaa;">Reset Params</button>
    </div>

    <div id="xy-section">
        <h3>Parameters</h3>
        <div id="xy-pads">

            <!-- Top row: Scale / Blur -->
            <div class="xy-wrap">
                <div class="xy-title">Scale X / Y</div>
                <div class="xy-pad-outer">
                    <div class="xy-pad" id="pad-0"
                         data-xparam="mxformx" data-xmin="1" data-xmax="15"
                         data-yparam="mxformy" data-ymin="1" data-ymax="15">
                        <div class="xy-dot"></div>
                    </div>
                    <span class="xy-axis-label x-left">ScX 1</span>
                    <span class="xy-axis-label x-right">15</span>
                    <span class="xy-axis-label y-top">ScY 15</span>
                    <span class="xy-axis-label y-bot">1</span>
                </div>
            </div>

            <div class="xy-wrap">
                <div class="xy-title">Blur / Tilt</div>
                <div class="xy-pad-outer">
                    <div class="xy-pad" id="pad-1"
                         data-xparam="melt"  data-xmin="0" data-xmax="15"
                         data-yparam="theta" data-ymin="0" data-ymax="3.14159">
                        <div class="xy-dot"></div>
                    </div>
                    <span class="xy-axis-label x-left">Blur 0</span>
                    <span class="xy-axis-label x-right">15</span>
                    <span class="xy-axis-label y-top">Tilt 180°</span>
                    <span class="xy-axis-label y-bot">0°</span>
                </div>
            </div>

            <!-- Bottom row: Hue/Brightness / Shift -->
            <div class="xy-wrap">
                <div class="xy-title">Hue / Brightness</div>
                <div class="xy-pad-outer">
                    <div class="xy-pad" id="pad-2"
                         data-xparam="hue_angle"  data-xmin="0" data-xmax="3.14159"
                         data-yparam="brightness" data-ymin="1" data-ymax="0">
                        <div class="xy-dot"></div>
                    </div>
                    <span class="xy-axis-label x-left">Hue 0°</span>
                    <span class="xy-axis-label x-right">180°</span>
                    <span class="xy-axis-label y-top">Bri 0%</span>
                    <span class="xy-axis-label y-bot">100%</span>
                </div>
            </div>

            <div class="xy-wrap">
                <div class="xy-title">Shift X / Y</div>
                <div class="xy-pad-outer">
                    <div class="xy-pad" id="pad-3"
                         data-xparam="offset_x" data-xmin="0" data-xmax="127"
                         data-yparam="offset_y" data-ymin="0" data-ymax="127">
                        <div class="xy-dot"></div>
                    </div>
                    <span class="xy-axis-label x-left">ShX 0</span>
                    <span class="xy-axis-label x-right">127</span>
                    <span class="xy-axis-label y-top">ShY 127</span>
                    <span class="xy-axis-label y-bot">0</span>
                </div>
            </div>

        </div>
    </div>

    <script>
        const socket = io();

        // --- Connection status ---
        const connDot   = document.getElementById('conn-dot');
        const connLabel = document.getElementById('conn-label');
        socket.on('connect',    () => { connDot.classList.add('online');    connLabel.textContent = 'Connected'; });
        socket.on('disconnect', () => { connDot.classList.remove('online'); connLabel.textContent = 'Disconnected'; });
        socket.on('userCount',  (n) => { document.getElementById('user-count').textContent = `👤 ${n}`; });

        // --- Clear ---
        document.getElementById('clearBtn').addEventListener('click', () => socket.emit('clearCanvas'));
        socket.on('clearCanvas', () => { if (typeof clear === 'function') { clear(); background(0); } });

        // --- Reset Params ---
        document.getElementById('resetBtn').addEventListener('click', () => socket.emit('resetParams'));
        socket.on('resetParams', (defaults) => {
            Object.entries(defaults).forEach(([name, value]) => {
                applyParamToDot(name, value);
            });
        });

        // --- Helpers ---
        function hexToRgb(hex) {
            const b = parseInt(hex.substring(1), 16);
            return [(b >> 16) & 255, (b >> 8) & 255, b & 255];
        }

        // --- XY Pads ---
        // dotPos[padId] = {xRatio: 0-1, yRatio: 0-1}  (yRatio: 0=top=max, 1=bottom=min)
        const dotPos = {};

        function initPads() {
            document.querySelectorAll('.xy-pad').forEach(pad => {
                const id = pad.id;
                dotPos[id] = { xRatio: 0, yRatio: 1 }; // start bottom-left
                updateDot(pad, 0, 1);

                const onMove = (clientX, clientY) => {
                    const rect = pad.getBoundingClientRect();
                    const xRatio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
                    const yRatio = Math.max(0, Math.min(1, (clientY - rect.top)  / rect.height));
                    dotPos[id] = { xRatio, yRatio };
                    updateDot(pad, xRatio, yRatio);
                    emitParams(pad, xRatio, yRatio);
                };

                pad.addEventListener('mousedown',  (e) => { e.preventDefault(); onMove(e.clientX, e.clientY); });
                pad.addEventListener('mousemove',  (e) => { if (e.buttons) onMove(e.clientX, e.clientY); });
                pad.addEventListener('touchstart', (e) => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
                pad.addEventListener('touchmove',  (e) => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
            });
        }

        function updateDot(pad, xRatio, yRatio) {
            const dot = pad.querySelector('.xy-dot');
            dot.style.left = (xRatio * 100) + '%';
            dot.style.top  = (yRatio * 100) + '%';
        }

        function emitParams(pad, xRatio, yRatio) {
            const xmin = parseFloat(pad.dataset.xmin), xmax = parseFloat(pad.dataset.xmax);
            const ymin = parseFloat(pad.dataset.ymin), ymax = parseFloat(pad.dataset.ymax);
            const xVal = xmin + xRatio * (xmax - xmin);
            const yVal = ymax - yRatio * (ymax - ymin); // yRatio 0=top=max
            socket.emit('paramChange', { name: pad.dataset.xparam, value: xVal });
            socket.emit('paramChange', { name: pad.dataset.yparam, value: yVal });
        }

        // Apply a single param value to any matching pad dots
        function applyParamToDot(name, value) {
            document.querySelectorAll('.xy-pad').forEach(pad => {
                let ratio, axis;
                if (pad.dataset.xparam === name) {
                    const xmin = parseFloat(pad.dataset.xmin), xmax = parseFloat(pad.dataset.xmax);
                    ratio = (value - xmin) / (xmax - xmin);
                    axis = 'x';
                } else if (pad.dataset.yparam === name) {
                    const ymin = parseFloat(pad.dataset.ymin), ymax = parseFloat(pad.dataset.ymax);
                    ratio = 1 - (value - ymin) / (ymax - ymin);
                    axis = 'y';
                }
                if (axis !== undefined) {
                    const id = pad.id;
                    ratio = Math.max(0, Math.min(1, ratio));
                    if (axis === 'x') dotPos[id].xRatio = ratio;
                    else              dotPos[id].yRatio = ratio;
                    updateDot(pad, dotPos[id].xRatio, dotPos[id].yRatio);
                }
            });
        }

        // Receive param updates (from Max or other users) and move dots
        socket.on('paramUpdate', ({ name, value }) => applyParamToDot(name, value));

        initPads();

        // --- p5.js ---
        function setup() {
            const size = min(512, windowWidth);
            const cnv = createCanvas(size, size);
            cnv.parent(document.body);
            const statusbar = document.getElementById('statusbar');
            document.body.insertBefore(cnv.elt, statusbar.nextSibling);
            background(0);

            socket.on('drawData', (data) => {
                // data.x/y are normalized to 512 space — scale to local canvas
                fill(data.color[0], data.color[1], data.color[2]);
                noStroke();
                ellipse(data.x * width / 512, data.y * height / 512, 20, 20);
            });
        }

        function draw() { background(0, 5); }

        function sendAndDrawPoint(x, y, color) {
            // Normalize to 512 space so all clients draw at the same relative position
            const data = {
                x: Math.round(x * 512 / width),
                y: Math.round(y * 512 / height),
                color
            };
            fill(color[0], color[1], color[2]);
            noStroke();
            ellipse(x, y, 20, 20); // draw locally using raw canvas coords
            socket.emit('drawData', data);
        }

        function mouseDragged() {
            sendAndDrawPoint(mouseX, mouseY, hexToRgb(document.getElementById('colorPicker').value));
        }

        function touchMoved() {
            // Only capture (and draw) when touch is within canvas bounds
            if (mouseX >= 0 && mouseX <= width && mouseY >= 0 && mouseY <= height) {
                mouseDragged();
                return false; // prevent scroll
            }
            // Outside canvas → let the browser scroll
        }
    </script>
</body>
</html>
